{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOS Pet Rua</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS Personalizado -->
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>

<body class="bg-light d-flex flex-column min-vh-100">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'pet_list' %}">
                🐾 SOS Pet Rua
            </a>

            <button class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarNav"
                    aria-controls="navbarNav"
                    aria-expanded="false"
                    aria-label="Alternar navegação">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'pet_list' %}">
                            Feed de Adoção
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'fazer_denuncia' %}">
                            🚨 Denunciar
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'cadastro' %}">
                            Cadastrar-se
                        </a>
                    </li>

                </ul>
            </div>
        </div>
    </nav>

    <!-- Mensagens do Django -->
    <div class="container mt-3">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show"
                     role="alert">

                    {{ message }}

                    <button type="button"
                            class="btn-close"
                            data-bs-dismiss="alert"
                            aria-label="Fechar">
                    </button>
                </div>
            {% endfor %}
        {% endif %}
    </div>

    <!-- Conteúdo Principal -->
    <main class="container my-4 flex-grow-1">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Rodapé -->
    <footer class="bg-dark text-white text-center py-3 mt-auto">
        <p class="mb-0 small">
            &copy; 2026 SOS Pet Rua - Rede Colaborativa de Apoio Animal.
        </p>
    </footer>

    <!-- Bootstrap 5 JavaScript Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JavaScript Personalizado -->
    <script src="{% static 'js/scripts.js' %}"></script>

</body>
</html>
